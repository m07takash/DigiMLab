# テスト対象のAIモデルを設定します
# typeは "openai_compatible"（FastAPI等） または "openai" / "anthropic" を指定
models:
  - id: model_a
    name: "My AI Model A"
    type: openai_compatible          # FastAPI + OpenAI互換エンドポイント
    base_url: "http://ai-model-a:8001/v1"
    api_key: "dummy"                 # 認証不要なら任意の文字列
    default_params:
      temperature: 0.7
      max_tokens: 1024

  - id: gpt4o
    name: "GPT-4o (reference)"
    type: openai
    model: "gpt-4o"
    api_key: "${OPENAI_API_KEY}"
    default_params:
      temperature: 0.7
      max_tokens: 1024

  - id: claude_sonnet
    name: "Claude Sonnet (reference)"
    type: anthropic
    model: "claude-sonnet-4-5"
    api_key: "${ANTHROPIC_API_KEY}"
    default_params:
      temperature: 0.7
      max_tokens: 1024

# 評価（LLM-as-Judge）に使うモデル
judge:
  type: openai
  model: "${JUDGE_MODEL}"
  api_key: "${OPENAI_API_KEY}"
